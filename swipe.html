*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#1f2937;background:#fff}
#hdr{position:fixed;top:0;left:0;right:0;height:50px;background:#111827;color:#f9fafb;

          font-size:72px;pointer-events:none;opacity:0;z-index:100}
#swipe-ol.rej{background:rgba(253,164,175,.55)}
#swipe-ol.sl{background:rgba(253,211,77,.45)}
#dec-badge{position:fixed;top:calc(50px + 45vh + 6px);right:10px;z-index:200;font-size:11px;padding:2px 9px;

#dec-badge.sl{background:#fcd34d;color:#92400e;display:block}
#dec-badge.rj{background:#fecdd3;color:#9f1239;display:block}
#detail{position:fixed;top:calc(50px + 45vh);left:0;right:0;bottom:70px;

        will-change:transform;transform-origin:center bottom}
.d-addr{font-weight:700;font-size:15px;margin-bottom:2px;line-height:1.3}
.d-use{font-size:12px;color:#374151;margin-bottom:1px}
.d-zone{font-size:11px;color:#9ca3af;margin-bottom:4px}
.d-hint{text-align:center;font-size:10px;color:#d1d5db;letter-spacing:.03em;
        margin:2px 0 6px;user-select:none;pointer-events:none}
.d-div{border-top:1px solid #e5e7eb;margin:6px 0}
.dr{display:flex;gap:6px;font-size:12px;padding:3px 0;border-bottom:1px solid #f3f4f6}
.dk{color:#6b7280;flex:0 0 44%;word-break:break-word}
.dv{flex:1;font-weight:500;word-break:break-word}
#footer{position:fixed;bottom:0;left:0;right:0;height:70px;background:#f9fafb;
        border-top:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;padding:0 12px;z-index:1000}
.sw-btn{height:48px;border-radius:10px;border:2px solid;font-size:15px;font-weight:700;cursor:pointer;
        display:flex;align-items:center;justify-content:center;gap:5px;-webkit-tap-highlight-color:transparent}
.btn-rj{flex:1;border-color:#fb7185;background:#fff1f2;color:#9f1239}
.btn-rj:active{background:#fecdd3}
.btn-skip{width:48px;flex:0;border-color:#d1d5db;background:#f9fafb;color:#9ca3af;font-size:22px}
.btn-sl{flex:1;border-color:#d97706;background:#fffbeb;color:#92400e}
.btn-sl:active{background:#fef3c7}
#submit-bar{display:none;position:fixed;bottom:0;left:0;right:0;padding:12px 14px;

#submit-summary{text-align:center;font-size:13px;color:#6b7280;margin-bottom:8px}
#submit-btn{width:100%;height:50px;background:#111827;color:white;border:none;

#submit-btn:disabled{opacity:.55;cursor:not-allowed}

"const_year":null,"use":"GAS STATION","use_name":"ULTRAMAR","dwel_units_sum":0,"lot_coverage":0.194064,"lot_area":1450.0284,"main_build_area":281.3977,"sv_link":"http://maps.google.com/maps?q=&layer=c&cbll=44.65981263146911,-63.59543329047577&cbp=12,342.59,0,0,0","_cx":-63.59556440707392,"_cy":44.660103603171386,"_oid":"737811"}},{"type":"Feature","geometry":{"coordinates":[[[[-63.591279176178155,44.64585451214105],[-63.591286094182465,44.64585276585248],[-63.591401930249646,44.6458226379244],[-63.59141660907403,44.645852450153235],[-63.59173430570222,44.64576951209637],[-63.59178876684962,44.64575554613031],[-63.59190986165017,44.6459945646665],[-63.591909866227546,44.64599501476688],[-63.59190420462929,44.64599630445742],[-63.591414308356065,44.64612244651491],[-63.591279176178155,44.64585451214105]]]],"type":"MultiPolygon"},"properties":{"objectid":738132,"pid":"00162925","est_gfa":6004.661706164479,"zone":"HR-1","far":null,"maxbldhgt":null,"maxbldstry":7,"hrm_prop":false,"prv_prop":false,"fed_prop":false,"permit_num":null,"date_of_submission":null,"work_type":null,"estimated_project_value":null,"total_end_units":null,"aan":"04271408","a_value":2665400,"a_cap":2665400,"address":"6058 Pepperell St","sale_date":"PyQt5.QtCore.QDate(2025, 10, 21)","sale_price":0,"sale_count":1,"bl_id":"BL29062","owner":"PRIV","const_year":1958,"use":"RESIDENTIAL","use_name":null,"dwel_units_sum":15,"lot_coverage":0.302895,"lot_area":1214.0422,"main_build_area":367.7276,"sv_link":"http://maps.google.com/maps?q=&layer=c&cbll=44.64607074322715,-63.59194802324673&cbp=12,118.40,0,0,0","_cx":-63.591594457595015,"_cy":44.64593663595022,"_oid":"738132"}},{"type":"Feature","geometry":{"coordinates":[[[[-63.57931279942721,44.65147225855268],[-63.57931343356312,44.65147261543497],[-63.58024789496754,44.652111368330374],[-63.579864560177825,44.65238356954004],[-63.5798210568661,44.6524071158206],[-63.57977431600432,44.65242723957569],[-63.579506003766966,44.65224414070186],[-63.57961353947828,44.652163833080465],[-63.57944147841793,44.65204623364379],[-63.5795224745893,44.65198577617147],[-63.57931279942721,44.65147225855268]]]],"type":"MultiPolygon"},"properties":{"objectid":800019,"pid":"00149757","est_gfa":21681.297870159153,"zone":"CEN-2","far":8,"maxbldhgt":null,"maxbldstry":40,"hrm_prop":false,"prv_prop":false,"fed_prop":false,"permit_num":null,"date_of_submission":null,"work_type":null,"estimated_project_value":null,"total_end_units":null,"aan":"01850423","a_value":1662000,"a_cap":1662000,"address":"Brunswick St","sale_date":null,"sale_price":null,"sale_count":0,"bl_id":"BL144066","owner":"PRIV","const_year":1978,"use":"PARKING STRUCTURE","use_name":"BRUNSWICK PLACE PARKADE","dwel_units_sum":0,"lot_coverage":0.759718,"lot_area":3121.2621,"main_build_area":2371.2787,"sv_link":"http://maps.google.com/maps?q=&layer=c&cbll=44.65140657690393,-63.57940702458985&cbp=12,338.70,0,0,0","_cx":-63.57975123988774,"_cy":44.65202385710342,"_oid":"800019"}}]};
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-zJXGwUgGtY7Ji-AhvKLipFPfAmOCll9kWaLcQofmYXPqbB0JBPLinRHk9PqEohHo/exec';

const total = candidates.features ? candidates.features.length : 0;
const decisions = {};
let currentIdx = 0;
let _layer = null;
let _txStart = 0, _tyStart = 0, _dragging = false, _horizontal = false;

const map = L.map('map', {zoomControl:false, attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);

const ol     = document.getElementById('swipe-ol');
const badge  = document.getElementById('dec-badge');
const detail = document.getElementById('detail');

function _row(k, v) {
  if (v == null || v === '' || String(v) === 'null') return '';
  return '<div class="dr"><div class="dk">' + k + '</div><div class="dv">' + v + '</div></div>';
}
function _fmt(n)  { const v = parseFloat(n); return isNaN(v) ? null : Math.round(v).toLocaleString('en-US'); }
function _sqft(n) { const v = parseFloat(n); return isNaN(v) ? null : (Math.round(v / 0.092903 / 100) * 100).toLocaleString('en-US') + ' sf'; }
function _pct(n)  { const v = parseFloat(n); return (isNaN(v) || v === 0) ? null : Math.round(v * 100) + '%'; }
function _tc(s)   { return s ? String(s).toLowerCase().replace(/\b\w/g, c => c.toUpperCase()) : null; }
const OWN = {HRM:'HRM',FED:'Federal',PROV:'Province',PRIV:'Private',CNDO:'Condo',UNKWN:'Unknown'};

function showCandidate(idx) {
  if (!total) {
    detail.innerHTML = '<div style="padding:30px;text-align:center;color:#9ca3af;font-size:14px;">No candidates to review.</div>';
    return;
  }
  if (idx >= total) { showDone(); return; }
  const f = candidates.features[idx];
  const p = f.properties;

  document.getElementById('hdr-prog').textContent = (idx + 1) + ' / ' + total;
  document.getElementById('hdr-fill').style.width = (idx / total * 100) + '%';

  const oid = String(p.objectid);
  badge.className = '';
  badge.textContent = '';
  if (decisions[oid] === 'shortlist') { badge.className = 'sl'; badge.textContent = '★ Shortlisted'; }
  else if (decisions[oid] === 'rejected') { badge.className = 'rj'; badge.textContent = '✕ Rejected'; }

  if (_layer) { map.removeLayer(_layer); _layer = null; }
  try {
    _layer = L.geoJSON(f, {style:{color:'#3b82f6',weight:2,fillColor:'#93c5fd',fillOpacity:0.3}}).addTo(map);
    map.fitBounds(_layer.getBounds(), {padding:[28,28], maxZoom:18});
  } catch(e) {
    if (p._cy && p._cx) map.setView([p._cy, p._cx], 17);
  }

  const addr = p.address || p.situs_address || '—';
  // "USE_CODE · Use Name" header
  const useParts = [p.use, _tc(p.use_name)].filter(Boolean);
  // "Zone · zone_descrip · maxbldhgt m · FAR x.x" — same as desktop detail
  const zoneParts = [p.zone, p.zone_descrip].filter(Boolean);
  if (p.maxbldhgt) zoneParts.push(p.maxbldhgt + ' m');
  if (p.far != null && String(p.far) !== 'null' && String(p.far) !== '') zoneParts.push('FAR ' + p.far);

  let html = '<div class="d-addr">' + addr + '</div>';
  if (useParts.length) html += '<div class="d-use">' + useParts.join(' · ') + '</div>';
  if (zoneParts.length) html += '<div class="d-zone">' + zoneParts.join(' · ') + '</div>';
  html += '<div class="d-hint">← swipe to decide →</div>';
  html += '<div class="d-div"></div>';
  html += _row('Owner',          OWN[p.owner] || p.owner);
  html += _row('Est. GFA',       _sqft(p.est_gfa));
  html += _row('Lot Area',       _sqft(p.lot_area));
  html += _row('Lot Coverage',   _pct(p.lot_coverage));
  html += _row('Dwelling Units', _fmt(p.dwel_units_sum));
  html += _row('Assessed',       p.a_value ? '$' + _fmt(p.a_value) : null);
  html += _row('Bldg Area',      _sqft(p.main_build_area));
  html += _row('Sales Count',    _fmt(p.sales_count));
  html += _row('Sale Price',     p.sale_price ? '$' + _fmt(p.sale_price) : null);
  html += _row('Permit Work',    _tc(p.permit_work_type));
  html += _row('Permit #',       p.permit_num);
  html += _row('Permit Value',   p.estimated_project_value ? '$' + _fmt(p.estimated_project_value) : null);
  html += _row('PID',            p.pid);
  detail.innerHTML = html;
  detail.scrollTop = 0;
}

function decide(status) {
  if (currentIdx >= total) return;
  const oid = String(candidates.features[currentIdx].properties.objectid);
  if (status !== 'skip') decisions[oid] = status;
  ol.className = ''; ol.textContent = '';
  currentIdx++;
  showCandidate(currentIdx);
}

function undoLast() {
  if (currentIdx <= 0) return;
  currentIdx--;
  delete decisions[String(candidates.features[currentIdx].properties.objectid)];
  showCandidate(currentIdx);
}

function showDone() {
  document.getElementById('footer').style.display = 'none';
  const sl = Object.values(decisions).filter(v => v === 'shortlist').length;
  const rj = Object.values(decisions).filter(v => v === 'rejected').length;
  const sk = total - Object.keys(decisions).length;
  document.getElementById('submit-summary').textContent =
    sl + ' shortlisted · ' + rj + ' rejected' + (sk > 0 ? ' · ' + sk + ' skipped' : '');
  document.getElementById('submit-bar').style.display = 'block';
  document.getElementById('hdr-fill').style.width = '100%';
  document.getElementById('hdr-prog').textContent = 'Done!';
}

async function submitDecisions() {
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Submitting…';
  btn.disabled = true;
  const payload = Object.entries(decisions).map(([objectid, status]) => ({objectid, status}));
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', body: JSON.stringify(payload),
      headers: {'Content-Type': 'text/plain'}
    });
    btn.textContent = '✓ Submitted — safe to close';
    btn.style.background = '#065f46';
  } catch(err) {
    btn.textContent = 'Error — tap to retry';
    btn.disabled = false;
  }
}

// Swipe: map + detail move together with the finger
const mapWrap = document.getElementById('map-wrap');

function _setTransform(tx, rot, transition) {
  const t = transition || 'none';
  const v = 'translateX(' + tx + ') rotate(' + rot + ')';
  mapWrap.style.transition = t; mapWrap.style.transform = v;
  detail.style.transition  = t; detail.style.transform  = v;
}

function _applyDrag(dx) {
  _setTransform(dx + 'px', (dx * 0.06) + 'deg');
  const pct = Math.min(Math.abs(dx) / 120, 1);
  if (dx < -10) {
    ol.className = 'rej'; ol.textContent = '✕'; ol.style.opacity = pct;
  } else if (dx > 10) {
    ol.className = 'sl';  ol.textContent = '★'; ol.style.opacity = pct;
  } else {
    ol.className = ''; ol.textContent = ''; ol.style.opacity = 0;
  }
}

function _resetCard() {
  _setTransform('0', '0deg');
  ol.className = ''; ol.textContent = ''; ol.style.opacity = 0;
}

detail.addEventListener('touchstart', e => {
  _txStart = e.touches[0].clientX;
  _tyStart = e.touches[0].clientY;
  _dragging = true;
  _horizontal = false;
  mapWrap.style.transition = 'none';
  detail.style.transition  = 'none';
}, {passive:true});

detail.addEventListener('touchmove', e => {
  if (!_dragging) return;
  const dx = e.touches[0].clientX - _txStart;
  const dy = e.touches[0].clientY - _tyStart;
  if (!_horizontal && Math.abs(dx) > Math.abs(dy) + 6) _horizontal = true;
  if (_horizontal) {
    e.preventDefault();
    _applyDrag(dx);
  }
}, {passive:false});

detail.addEventListener('touchend', e => {
  if (!_dragging) return;
  _dragging = false;
  _horizontal = false;
  const dx = e.changedTouches[0].clientX - _txStart;
  const dy = e.changedTouches[0].clientY - _tyStart;
  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    // fly off screen, then load next candidate
    const dir = dx < 0 ? -1 : 1;
    _setTransform((dir * 110) + 'vw', (dir * 22) + 'deg', 'transform 0.28s ease-in');
    ol.style.opacity = 0;
    setTimeout(() => {
      _resetCard();
      decide(dx < 0 ? 'rejected' : 'shortlist');
    }, 280);
  } else {
    // snap back to centre with a little bounce
    _setTransform('0', '0deg', 'transform 0.3s cubic-bezier(0.34,1.56,0.64,1)');
    ol.style.opacity = 0;
    ol.className = ''; ol.textContent = '';
  }
}, {passive:true});

showCandidate(0);
</script>
